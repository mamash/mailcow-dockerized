volumes:
  vmail-vol-1:
    driver_opts:
      type: none
      device: /mnt/mailcow/vmail
      o: bind
  mailman-lib:
  mailman-postfix:
  mailman-archives:
    driver_opts:
      type: none
      device: /mnt/mailcow/mailman-archives
      o: bind

services:
  dovecot-mailcow:
    build: ./data/Dockerfiles/dovecot
    labels:
      ofelia.job-exec.dovecot_recalc_quota.schedule: "@every 24h"
      ofelia.job-exec.dovecot_recalc_quota.command: "/bin/bash -c \"[[ $${MASTER} == y ]] && doveadm quota recalc -A || exit 0\""
    logging:
      options:
        max-size: "5m"

  postfix-mailcow:
    build: ./data/Dockerfiles/postfix
    logging:
      options:
        max-size: "5m"

  php-fpm-mailcow:
    logging:
      options:
        max-size: "5m"

  unbound-mailcow:
    logging:
      options:
        max-size: "5m"

  mysql-mailcow:
    logging:
      options:
        max-size: "5m"

  redis-mailcow:
    logging:
      options:
        max-size: "5m"

  clamd-mailcow:
    logging:
      options:
        max-size: "5m"

  rspamd-mailcow:
    logging:
      options:
        max-size: "5m"

  sogo-mailcow:
    logging:
      options:
        max-size: "5m"

  memcached-mailcow:
    logging:
      options:
        max-size: "5m"

  nginx-mailcow:
    logging:
      options:
        max-size: "5m"

  acme-mailcow:
    logging:
      options:
        max-size: "5m"

  netfilter-mailcow:
    logging:
      options:
        max-size: "5m"

  watchdog-mailcow:
    logging:
      options:
        max-size: "5m"

  dockerapi-mailcow:
    logging:
      options:
        max-size: "5m"

  olefy-mailcow:
    logging:
      options:
        max-size: "5m"

  ofelia-mailcow:
    logging:
      options:
        max-size: "5m"

  mailman:
    build: data/Dockerfiles/mailman
    environment:
      - MAILMAN_URLHOST
      - MAILMAN_EMAILHOST
      - MAILMAN_ADMINMAIL
      - MAILMAN_ADMINPASS
    expose:
      - 25
      - 80
    volumes:
      - mailman-archives:/var/lib/mailman/archives
      - mailman-lib:/var/lib/mailman
      - mailman-postfix:/var/spool/postfix
    dns:
      - ${IPV4_NETWORK:-172.22.1}.254
    hostname: mailman
    restart: always
    networks:
      mailcow-network:
        aliases:
          - mailman
    logging:
      options:
        max-size: "5m"

  logz:
    image: "logzio/docker-logs-collector:latest"
    container_name: logz
    environment:
      - "LOGZIO_LOGZ_TOKEN=${LOGZIO_TOKEN}"
      - "LOGZIO_URL=https://listener-eu.logz.io:8071"
      - "HOSTNAME=perry"
      - "SET_FIELDS=host:perry"
      - "SKIP_CONTAINER_NAMES=backup,dockerapi,olefy,logz,metrics,nginx,redis,sogo,solr,watchdog,ofelia"
      - "EXCLUDE_LINES=CRON,forwardinghosts,wp-login"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers
    restart: always
    networks:
      mailcow-network:
        aliases:
          - logz
    logging:
      options:
        max-size: "5m"
